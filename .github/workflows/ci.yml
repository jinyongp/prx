name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v '^internal/truststore/'))
          test -z "$unformatted" || { echo "unformatted: $unformatted"; exit 1; }
      - name: vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
      - name: test
        run: go test -race -cover ./...

  build:
    needs: [check]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: build
        run: |
          ./scripts/build-prx.sh "${{ github.ref_name }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prx-${{ github.sha }}
          path: |
            prx-darwin-amd64
            prx-darwin-arm64
            prx-linux-amd64
            prx-linux-arm64
      - name: detect release tag
        id: release_tag
        run: |
          TAG="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: checksums
        if: steps.release_tag.outputs.tag != ''
        run: |
          sha256sum prx-darwin-amd64 prx-darwin-arm64 prx-linux-amd64 prx-linux-arm64 > checksums.txt
      - name: publish release
        if: steps.release_tag.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          # Use the annotated tag message (written by scripts/release-publish.sh,
          # a "Release <tag>" header plus the commit changelog) as the notes.
          # subject+body excludes any GPG signature block; fall back to a bare
          # line for lightweight tags.
          NOTES="$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "$TAG")"
          [ -n "$(echo "$NOTES" | tr -d '[:space:]')" ] || NOTES="Release $TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" prx-* checksums.txt --clobber
          else
            gh release create "$TAG" \
              prx-darwin-amd64 prx-darwin-arm64 prx-linux-amd64 prx-linux-arm64 checksums.txt \
              --title "$TAG" \
              --notes "$NOTES" \
              --verify-tag
          fi
