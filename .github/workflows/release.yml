name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: build release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ./scripts/build-prx.sh "$VERSION"

      - name: checksums
        run: |
          sha256sum prx-darwin-amd64 prx-darwin-arm64 prx-linux-amd64 prx-linux-arm64 > checksums.txt

      - name: publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" prx-* checksums.txt --clobber
          else
            gh release create "$TAG" \
              prx-darwin-amd64 prx-darwin-arm64 prx-linux-amd64 prx-linux-arm64 checksums.txt \
              --title "$TAG" \
              --notes "Release $TAG"
          fi
