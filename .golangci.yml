version: "2"

# Explicit enable only. `default: none` keeps opinionated/noisy linters out so
# automated fixes stay predictable. Add linters deliberately, not via `all`.
linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - errorlint
    - nilnil
    - bodyclose
    - contextcheck
    - exhaustive
    - gocritic
    - revive
    - unparam
    - nolintlint
    - gosec # prx security surface: os/exec, file perms 0600, /etc/hosts, sudo

  settings:
    errcheck:
      # Writes to stdout/stderr conventionally ignore their error.
      exclude-functions:
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Writer).Write
    gosec:
      # G304: prx legitimately reads files by user-provided paths (config,
      # registry, certs). Keep the file/dir permission checks (G301/G302/G306).
      # G705/G710: taint-analysis rules that false-positive on a reverse proxy
      # (echoing the Host header, redirecting http→https on the same host).
      excludes:
        - G304
        - G705
        - G710
    nolintlint:
      require-explanation: true
      require-specific: true

  # Vendored upstream code is not held to prx's lint rules.
  exclusions:
    paths:
      - internal/truststore
    rules:
      # Test code legitimately triggers these; keep them on for real code.
      - path: _test\.go
        linters:
          - unparam
          - contextcheck
      - path: _test\.go
        text: "unused-parameter"
        linters:
          - revive
    # Start revive light — enable rules incrementally so code stays idiomatic
    # rather than "rule-satisfying".
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: var-declaration

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  relative-path-mode: gomod
